      const modal = document.getElementById("modal");
      const modalWindow = modal.querySelector(".modal-window");
      const modalTitle = document.getElementById("modalTitle");
      const modalContent = document.getElementById("modalContent");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderSite() {
        document.title = `${DATA.brand.name} | ${DATA.brand.title}`;
        document.getElementById("brandName").textContent = DATA.brand.name;
        document.getElementById("brandTitle").textContent = DATA.brand.title;
        document.getElementById("introTitle").textContent = DATA.intro.title;
        document.getElementById("introText").textContent = DATA.intro.text;
        document.getElementById("copyright").textContent =
          "(c) " + new Date().getFullYear() + " " + DATA.brand.name;

        document.getElementById("gameJump").innerHTML = DATA.games.map((game) =>
          `<a class="game-link" href="#${escapeHtml(game.id)}">${escapeHtml(game.title)}</a>`
        ).join("");

        document.getElementById("portfolio").innerHTML = DATA.games.map((game) => `
          <section class="section" id="${escapeHtml(game.id)}">
            <article class="window">
              <div class="window-bar">
                <div class="window-title">${escapeHtml(game.title)}</div>
              </div>
              <div class="game-banner" style="background-image: url('${escapeHtml(game.banner)}')">
                <div class="game-banner-inner">
                  <h2>${escapeHtml(game.title)}</h2>
                </div>
              </div>
              <div class="tile-grid">
                ${game.projects.map((project) => `
                  <button class="tile" type="button" data-project="${escapeHtml(project.id)}">
                    <div class="tile-media">
                      <img src="${escapeHtml(project.images[0].src)}" alt="${escapeHtml(project.title)}">
                    </div>
                    <div class="tile-body">
                      <h3>${escapeHtml(project.title)}</h3>
                    </div>
                  </button>
                `).join("")}
              </div>
            </article>
          </section>
        `).join("");

        document.querySelectorAll("[data-project]").forEach((button) => {
          button.addEventListener("click", () => openProject(button.dataset.project));
        });
      }

      function findProject(id) {
        for (const game of DATA.games) {
          const project = game.projects.find((item) => item.id === id);
          if (project) return { game, project };
        }
        return null;
      }

      function openModal(title, content, wide = false) {
        modalTitle.textContent = title;
        modalContent.innerHTML = content;
        modalWindow.classList.toggle("wide", wide);
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      function openProject(id) {
        const found = findProject(id);
        if (!found) return;
        const { game, project } = found;
        const firstImage = project.images[0];

        openModal(
          `${game.title} / ${project.title}`,
          `
            <div class="project-viewer" data-carousel>
              <div class="viewer-stage">
                <img
                  class="viewer-image"
                  data-viewer-image
                  src="${escapeHtml(firstImage.src)}"
                  alt="${escapeHtml(firstImage.title || project.title)}"
                >
                <button class="viewer-arrow viewer-arrow-left" type="button" data-carousel-prev aria-label="Previous image">
                  &lt;
                </button>
                <button class="viewer-arrow viewer-arrow-right" type="button" data-carousel-next aria-label="Next image">
                  &gt;
                </button>
              </div>
              <div class="thumb-strip" aria-label="Project images">
                ${project.images.map((image, index) => `
                  <button
                    class="thumb-button ${index === 0 ? "active" : ""}"
                    type="button"
                    data-carousel-thumb="${index}"
                    aria-label="Show ${escapeHtml(image.title || project.title)}"
                  >
                    <img src="${escapeHtml(image.src)}" alt="">
                  </button>
                `).join("")}
              </div>
              <section class="project-detail">
                <h3>${escapeHtml(project.title)}</h3>
                <div class="description-panel">
                  <p>${escapeHtml(project.text)}</p>
                </div>
              </section>
            </div>
          `,
          true
        );
        attachCarousel(project);
      }

      function attachCarousel(project) {
        const viewer = modalContent.querySelector("[data-carousel]");
        if (!viewer) return;

        const image = viewer.querySelector("[data-viewer-image]");
        const thumbs = Array.from(viewer.querySelectorAll("[data-carousel-thumb]"));
        let activeIndex = 0;

        function showImage(nextIndex) {
          activeIndex = (nextIndex + project.images.length) % project.images.length;
          const nextImage = project.images[activeIndex];
          image.src = nextImage.src;
          image.alt = nextImage.title || project.title;
          thumbs.forEach((thumb, index) => {
            thumb.classList.toggle("active", index === activeIndex);
          });
        }

        viewer.querySelector("[data-carousel-prev]").addEventListener("click", () => {
          showImage(activeIndex - 1);
        });
        viewer.querySelector("[data-carousel-next]").addEventListener("click", () => {
          showImage(activeIndex + 1);
        });
        thumbs.forEach((thumb) => {
          thumb.addEventListener("click", () => {
            showImage(Number(thumb.dataset.carouselThumb));
          });
        });
      }

      function openInfo(type) {
        if (!DATA) return;

        if (type === "about") {
          openModal("About", `
            <div class="about-popout">
              <div class="profile-icon" aria-hidden="true">
                ${DATA.infoWindows.about.profileImage
                  ? `<img src="${escapeHtml(DATA.infoWindows.about.profileImage)}" alt="">`
                  : `<span>KE</span>`}
              </div>
              <div class="about-copy">
                <h2>${escapeHtml(DATA.infoWindows.about.title)}</h2>
                <p>${escapeHtml(DATA.infoWindows.about.text)}</p>
              </div>
              <div class="contact-panel">
                <h3>Contact</h3>
                <div class="contact-links">
                  <a href="${escapeHtml(DATA.brand.email)}">Keegan.Edwards@gmail.com</a>
                  <a href="${escapeHtml(DATA.brand.linkedin)}" target="_blank" rel="noreferrer">LinkedIn</a>
                  <a href="${escapeHtml(DATA.brand.resume)}" target="_blank" rel="noreferrer">Resume</a>
                </div>
              </div>
            </div>
          `);
        }
      }

      document.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => openInfo(button.dataset.open));
      });

      document.querySelector("[data-close]").addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });

      renderSite();
