<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keegan Edwards | Senior Technical Artist</title>
    <meta name="description" content=" Keegan Edwards, Senior Technical Artist Portfolio.">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="content.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="#top" aria-label="Keegan Edwards home">
          <span class="brand-name" id="brandName">Keegan Edwards</span>
          <span class="brand-title" id="brandTitle">Technical Artist</span>
        </a>
        <nav class="nav" id="mainNav" aria-label="Main navigation" data-main-nav>
          <span class="nav-links" id="topGameLinks"></span>
          <button type="button" data-open="about">About</button>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="topGameLinks" data-menu-toggle>
            Menu
          </button>
        </nav>
      </div>
    </header>

    <main id="top">
      <section class="hero wrap" aria-labelledby="introTitle">
        <div class="window">
          <div class="hero-content">
            <h1 id="introTitle">
              <span id="introName"></span><span class="intro-separator">, </span><span class="intro-role" id="introRole"></span>
            </h1>
            <div class="hero-copy rich-text" id="introText"></div>
          </div>
        </div>
      </section>

      <div class="wrap" id="portfolio"></div>
    </main>

    <footer class="footer wrap">
      <span id="copyright"></span>
    </footer>

    <div class="modal-backdrop" id="modal" aria-hidden="true">
      <section class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="window-bar">
          <div class="window-title" id="modalTitle">Window</div>
          <button class="close" type="button" aria-label="Close window" data-close>x</button>
        </div>
        <div class="modal-content" id="modalContent"></div>
      </section>
    </div>

    <script>
      const DATA = window.PORTFOLIO_DATA;
      const modal = document.getElementById("modal");
      const modalWindow = modal.querySelector(".modal-window");
      const modalTitle = document.getElementById("modalTitle");
      const modalContent = document.getElementById("modalContent");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderMarkdown(value) {
        return window.marked ? window.marked.parse(String(value || "")) : escapeHtml(value);
      }

      function renderSite() {
        document.title = `${DATA.brand.name} | ${DATA.brand.title}`;
        document.getElementById("brandName").textContent = DATA.brand.name;
        document.getElementById("brandTitle").textContent = DATA.brand.title;
        document.getElementById("introName").textContent = DATA.intro.name || DATA.brand.name.toUpperCase();
        document.getElementById("introRole").textContent = DATA.intro.title || DATA.brand.title.toUpperCase();
        document.getElementById("introText").innerHTML = renderMarkdown(DATA.intro.text);
        document.getElementById("copyright").textContent =
          "(c) " + new Date().getFullYear() + " " + DATA.brand.name;

        document.getElementById("topGameLinks").innerHTML = DATA.games.map((game) =>
          `<a href="#${escapeHtml(game.id)}">${escapeHtml(game.title)}</a>`
        ).join("");

        document.getElementById("portfolio").innerHTML = DATA.games.map((game) => `
          <section class="section" id="${escapeHtml(game.id)}">
            <article class="window">
              <div class="window-bar">
                <div class="window-title">${escapeHtml(game.title)}</div>
              </div>
              <div class="game-banner ${game.bannerPosition === "top" ? "banner-top" : ""}" style="background-image: url('${escapeHtml(game.banner)}')">
              </div>
              <div class="tile-grid">
                ${game.projects.map((project) => `
                  <button
                    class="tile ${project.thumbnailPosition === "top" ? "tile-top-image" : ""}"
                    type="button"
                    data-project="${escapeHtml(project.id)}"
                    data-thumb-src="${escapeHtml(project.thumbnail || project.images[0].src)}"
                    data-hover-src="${escapeHtml(project.images[0].src)}"
                  >
                    <div class="tile-media">
                      <img src="${escapeHtml(project.thumbnail || project.images[0].src)}" alt="${escapeHtml(project.title)}">
                    </div>
                    <div class="tile-body">
                      <h3>${escapeHtml(project.title)}</h3>
                    </div>
                  </button>
                `).join("")}
              </div>
            </article>
          </section>
        `).join("");

        document.querySelectorAll("[data-project]").forEach((button) => {
          button.addEventListener("click", () => openProject(button.dataset.project));
          button.addEventListener("mouseenter", () => swapTileImage(button, "hover"));
          button.addEventListener("mouseleave", () => swapTileImage(button, "thumb"));
          button.addEventListener("focus", () => swapTileImage(button, "hover"));
          button.addEventListener("blur", () => swapTileImage(button, "thumb"));
        });
      }

      function swapTileImage(tile, mode) {
        const img = tile.querySelector(".tile-media img");
        if (!img) return;
        const nextSrc = mode === "hover" ? tile.dataset.hoverSrc : tile.dataset.thumbSrc;
        if (nextSrc && img.getAttribute("src") !== nextSrc) {
          img.src = nextSrc;
        }
      }

      function findProject(id) {
        for (const game of DATA.games) {
          const project = game.projects.find((item) => item.id === id);
          if (project) return { game, project };
        }
        return null;
      }

      function openModal(title, content, wide = false) {
        modalTitle.textContent = title;
        modalContent.innerHTML = content;
        modalWindow.classList.toggle("wide", wide);
        modal.classList.add("open");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        modal.classList.remove("open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      function openProject(id) {
        const found = findProject(id);
        if (!found) return;
        const { game, project } = found;
        const firstImage = project.images[0];

        openModal(
          `${game.title} / ${project.title}`,
          `
            <div class="project-viewer" data-carousel>
              <div class="viewer-stage">
                <img
                  class="viewer-image"
                  data-viewer-image
                  src="${escapeHtml(firstImage.src)}"
                  alt="${escapeHtml(firstImage.title || project.title)}"
                >
                <button class="viewer-arrow viewer-arrow-left" type="button" data-carousel-prev aria-label="Previous image">
                  &lt;
                </button>
                <button class="viewer-arrow viewer-arrow-right" type="button" data-carousel-next aria-label="Next image">
                  &gt;
                </button>
              </div>
              <div class="thumb-strip" aria-label="Project images">
                ${project.images.map((image, index) => `
                  <button
                    class="thumb-button ${index === 0 ? "active" : ""}"
                    type="button"
                    data-carousel-thumb="${index}"
                    aria-label="Show ${escapeHtml(image.title || project.title)}"
                  >
                    <img src="${escapeHtml(image.src)}" alt="">
                  </button>
                `).join("")}
              </div>
              <section class="project-detail">
                <h3>${escapeHtml(project.title)}</h3>
                <div class="description-panel">
                  <div class="rich-text">${renderMarkdown(project.text)}</div>
                </div>
              </section>
            </div>
          `,
          true
        );
        attachCarousel(project);
      }

      function attachCarousel(project) {
        const viewer = modalContent.querySelector("[data-carousel]");
        if (!viewer) return;

        const image = viewer.querySelector("[data-viewer-image]");
        const thumbs = Array.from(viewer.querySelectorAll("[data-carousel-thumb]"));
        let activeIndex = 0;

        function showImage(nextIndex) {
          activeIndex = (nextIndex + project.images.length) % project.images.length;
          const nextImage = project.images[activeIndex];
          image.src = nextImage.src;
          image.alt = nextImage.title || project.title;
          thumbs.forEach((thumb, index) => {
            thumb.classList.toggle("active", index === activeIndex);
          });
        }

        viewer.querySelector("[data-carousel-prev]").addEventListener("click", () => {
          showImage(activeIndex - 1);
        });
        viewer.querySelector("[data-carousel-next]").addEventListener("click", () => {
          showImage(activeIndex + 1);
        });
        thumbs.forEach((thumb) => {
          thumb.addEventListener("click", () => {
            showImage(Number(thumb.dataset.carouselThumb));
          });
        });
      }

      function openInfo(type) {
        if (!DATA) return;

        if (type === "about") {
          openModal("About", `
            <div class="about-popout">
              <div class="profile-icon" aria-hidden="true">
                ${DATA.infoWindows.about.profileImage
                  ? `<img src="${escapeHtml(DATA.infoWindows.about.profileImage)}" alt="">`
                  : `<span>KE</span>`}
              </div>
              <div class="about-copy">
                <h2>${escapeHtml(DATA.infoWindows.about.title)}</h2>
                <div class="rich-text">${renderMarkdown(DATA.infoWindows.about.text)}</div>
              </div>
              <div class="contact-panel">
                <h3>Contact</h3>
                <div class="contact-links">
                  <a href="${escapeHtml(DATA.brand.email)}">Keegan.Edwards@gmail.com</a>
                  <a href="${escapeHtml(DATA.brand.linkedin)}" target="_blank" rel="noreferrer">LinkedIn</a>
                  <a href="${escapeHtml(DATA.brand.resume)}" target="_blank" rel="noreferrer">Resume</a>
                </div>
              </div>
            </div>
          `);
        }
      }

      document.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => openInfo(button.dataset.open));
      });

      const menuToggle = document.querySelector("[data-menu-toggle]");
      const mainNav = document.querySelector("[data-main-nav]");
      menuToggle.addEventListener("click", () => {
        const isOpen = mainNav.classList.toggle("open");
        menuToggle.setAttribute("aria-expanded", String(isOpen));
      });
      mainNav.addEventListener("click", (event) => {
        if (event.target.closest("[data-menu-toggle]")) return;
        if (event.target.closest("a, button")) {
          mainNav.classList.remove("open");
          menuToggle.setAttribute("aria-expanded", "false");
        }
      });

      document.querySelector("[data-close]").addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });

      renderSite();
    </script>
  </body>
</html>
